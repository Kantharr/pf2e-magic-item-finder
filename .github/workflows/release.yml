name: Release

# Cut a release when a version tag is pushed, e.g. `git tag v1.0.0 && git push --tags`.
# Builds dist/, patches module.json's version + download URL to the tag, zips the
# built module, and publishes a GitHub release with both artifacts attached:
#   - module.zip     -> the `download` URL (versioned asset)
#   - module.json    -> the `manifest` URL (releases/latest/download/module.json)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Patch dist/module.json version + download URL
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          jq --arg v "$VERSION" \
             --arg dl "https://github.com/$REPO/releases/download/$TAG/module.zip" \
             '.version = $v | .download = $dl' \
             dist/module.json > dist/module.json.tmp
          mv dist/module.json.tmp dist/module.json
          echo "--- dist/module.json ---"
          cat dist/module.json

      - name: Zip built module
        run: cd dist && zip -r ../module.zip .

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          module.zip
          dist/module.json
          --title "$GITHUB_REF_NAME"
          --generate-notes
